name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Compile Python
        run: python -m py_compile serve.py mcp_package/link_mcp/server.py mcp_package/link_mcp/__main__.py mcp_package/link_mcp/__init__.py
      - name: Check shell syntax
        run: bash -n integrations/*/install.sh integrations/*/uninstall.sh integrations/_shared/*.sh
      - name: Run tests
        run: python -m unittest discover -s tests
