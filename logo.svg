<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d2137"/>
      <stop offset="100%" stop-color="#060d18"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="200" height="200" rx="32" fill="url(#bg)"/>

  <!-- Edges of the L -->
  <g stroke="#2dd4bf" stroke-width="2.5" filter="url(#glow)" opacity="0.85" stroke-linecap="round">
    <!-- Vertical stroke of L -->
    <line x1="68" y1="38" x2="68" y2="148"/>
    <!-- Horizontal stroke of L -->
    <line x1="68" y1="148" x2="148" y2="148"/>
    <!-- Top cap -->
    <line x1="68" y1="38" x2="110" y2="38"/>
    <!-- Mid horizontal cross -->
    <line x1="68" y1="93" x2="110" y2="93"/>
    <!-- Diagonal top-left to mid-right -->
    <line x1="68" y1="38" x2="110" y2="93"/>
    <!-- Right vertical (top section) -->
    <line x1="110" y1="38" x2="110" y2="93"/>
    <!-- Diagonal mid to bottom-right -->
    <line x1="68" y1="93" x2="110" y2="148"/>
  </g>

  <!-- Nodes -->
  <g filter="url(#glow)">
    <!-- Top-left -->
    <circle cx="68" cy="38" r="7" fill="#2dd4bf" opacity="0.95"/>
    <!-- Top-right -->
    <circle cx="110" cy="38" r="5.5" fill="#2dd4bf" opacity="0.85"/>
    <!-- Mid-left (junction) -->
    <circle cx="68" cy="93" r="8" fill="#2dd4bf" opacity="1"/>
    <!-- Mid-right -->
    <circle cx="110" cy="93" r="5.5" fill="#2dd4bf" opacity="0.85"/>
    <!-- Bottom-left -->
    <circle cx="68" cy="148" r="6" fill="#2dd4bf" opacity="0.9"/>
    <!-- Bottom-mid -->
    <circle cx="110" cy="148" r="6" fill="#2dd4bf" opacity="0.9"/>
    <!-- Bottom-right (end of L) -->
    <circle cx="148" cy="148" r="7" fill="#2dd4bf" opacity="0.95"/>
  </g>

  <!-- "Link" text -->
  <text x="100" y="182" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="22" font-weight="300" letter-spacing="6" fill="#2dd4bf" opacity="0.7"
        text-anchor="middle">LINK</text>
</svg>
